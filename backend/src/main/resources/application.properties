spring.application.name=backend
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/silverlineupload}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=uploads/
server.port=8080

# JWT Configuration
app.jwt.secret=${JWT_SECRET:courseuploadsecretkeycourseuploadsecretkeycourseuploadsecretkey}
app.jwt.expirationMs=${JWT_EXPIRATION_MS:86400000}
